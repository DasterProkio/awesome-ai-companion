name: PR-triggered README curation

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  curate:
    if: github.event.pull_request.title == '[maintainer] apply README curation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Update README files
        run: python3 scripts/one-off-readme-curation.py
      - name: Commit curated README changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md README.zh-CN.md
          git diff --cached --quiet && exit 0
          git commit -m "Curate new reference entries and center README header"
          git push origin HEAD:main
